<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <title>Login • Sistema</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-white">

<div class="container d-flex justify-content-center align-items-center vh-100">
  <div class="card p-4 bg-black" style="width:380px">
    <h4 class="mb-3 text-center">Login</h4>

    <form id="loginForm">
      <input id="email" class="form-control mb-2" placeholder="Email" required>
      <input id="password" type="password" class="form-control mb-2" placeholder="Senha" required>
      <button class="btn btn-primary w-100">Entrar</button>

      <div class="mt-3 text-center">
  <small>
    Primeiro acesso? 
    <a href="primeiro_acesso.html" class="text-info">
      Clique aqui para criar sua senha
    </a>
  </small>
</div>

    </form>

    <div id="msg" class="small text-warning mt-3 text-center"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>

<script>
const form = document.getElementById("loginForm");
const msg = document.getElementById("msg");

form.onsubmit = async (e) => {
  e.preventDefault();
  msg.textContent = "Entrando...";

  const { data, error } = await sb.auth.signInWithPassword({
    email: email.value.trim().toLowerCase(),
    password: password.value
  });

  if (error) {
    msg.textContent = error.message;
    return;
  }

  const user = data.user;

  const { data: profile } = await sb
    .from("profiles")
    .select("role,ativo")
    .eq("id", user.id)
    .single();

  if (!profile || profile.ativo === false) {
    msg.textContent = "Usuário sem perfil ou desativado";
    await sb.auth.signOut();
    return;
  }

  if (profile.role === "logistica") location.href = "logistica.html";
  else if (profile.role === "motorista_proprio") location.href = "motorista.html";
   else if (profile.role === "motorista_terceiro") location.href = "terceiro.html";
  else if (profile.role === "portaria") location.href = "portaria.html";
};
</script>
</body>
</html>
