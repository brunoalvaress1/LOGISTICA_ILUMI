<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Primeiro Acesso</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background:#0f172a; color:#fff; }
    .card { background:#020617; border:1px solid #1e293b; }
    .muted { color:#94a3b8; }
  </style>
</head>
<body>
  <div class="container py-5" style="max-width:520px">
    <h3 class="mb-2">Primeiro acesso</h3>
    <p class="muted">
      Use o <b>mesmo e-mail</b> que a Logística cadastrou e crie sua senha.
    </p>

    <div class="card p-3">
      <form id="formFirst" class="vstack gap-3">
        <div>
          <label class="form-label">E-mail</label>
          <input id="email" type="email" class="form-control" required>
        </div>

        <div>
          <label class="form-label">Senha</label>
          <input id="password" type="password" class="form-control" minlength="6" required>
          <div class="form-text muted">Mínimo 6 caracteres.</div>
        </div>

        <button class="btn btn-primary" type="submit" id="btn">
          Criar senha e ativar
        </button>

        <a class="btn btn-outline-light" href="index.html">Voltar para login</a>

        <div id="msg" class="small muted"></div>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <script>
    const form = document.getElementById("formFirst");
    const msg = document.getElementById("msg");
    const btn = document.getElementById("btn");

    function setMsg(t, ok=false){
  msg.className = "small " + (ok ? "text-success" : "text-warning");
  msg.textContent = t || "";
}

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  const userEmail = document.getElementById("email").value.trim().toLowerCase();
  const password = document.getElementById("password").value;

  btn.disabled = true;
  btn.textContent = "Processando...";

  try {
    setMsg("Criando conta...");

    
    const { error: e1 } = await sb.auth.signUp({ email: userEmail, password });

    if (e1) {
      if (String(e1.message || "").toLowerCase().includes("already registered")) {
        const { error: eLogin } = await sb.auth.signInWithPassword({ email: userEmail, password });
        if (eLogin) {
          setMsg("Esse email já existe. Verifique a senha ou faça login.", false);
          return;
        }
      } else {
        setMsg("Erro ao criar conta: " + e1.message);
        return;
      }
    }

  
    const { data: s } = await sb.auth.getSession();
    const user = s?.session?.user;

    if (!user) {
      setMsg("Conta criada. Agora confirme seu e-mail e faça login.", true);
      return;
    }

    setMsg("Verificando pré-cadastro...");

    const { data: pend, error: e2 } = await sb
      .from("profiles_pending")
      .select("email,nome,role,tipo")
      .eq("email", userEmail)
      .single();

    if (e2 || !pend) {
      setMsg("Seu e-mail não foi pré-cadastrado pela Logística.", false);
      return;
    }

    setMsg("Ativando seu perfil...");

    const roleFinal = pend.tipo === "proprio"
      ? "motorista_proprio"
      : "motorista_terceiro";

    const { error: e3 } = await sb.from("profiles").insert({
      id: user.id,
      role: roleFinal,
      nome: pend.nome,
      email: pend.email,
      ativo: true
    });

    if (e3) {
      setMsg("Erro ao criar perfil: " + e3.message);
      return;
    }

    await sb.from("profiles_pending").delete().eq("email", userEmail);

    setMsg("Pronto! Conta ativada. Indo para o login...", true);
    setTimeout(() => location.href = "index.html", 1200); 

  } catch (err) {
    console.error(err);
    setMsg("Erro inesperado: " + (err?.message || err));
  } finally {
    btn.disabled = false;
    btn.textContent = "Criar senha e ativar";
  }
});

  </script>
</body>
</html>
