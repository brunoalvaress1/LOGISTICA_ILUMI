<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Ilumi • Terceiro</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="./css/app.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark border-bottom" style="border-color: rgba(255,255,255,.12)!important;">
  <div class="container-fluid px-3">
    <a class="navbar-brand d-flex align-items-center gap-2" href="#">
      <i class="bi bi-map"></i> Ilumi • Terceiro
    </a>
    <div class="ms-auto d-flex align-items-center gap-2">
      <span class="badge badge-soft" id="userBadge">—</span>
      <button class="btn btn-outline-light btn-sm" id="btnLogout"><i class="bi bi-box-arrow-right me-1"></i>Sair</button>
    </div>
  </div>
</nav>

<div class="container py-4">
  <div class="card glass p-3">
    <div class="d-flex align-items-center justify-content-between">
      <div>
        <div class="h6 mb-0">Meus serviços</div>
        <div class="small-muted">Marque como entregue ou coletado</div>
      </div>
      <button class="btn btn-outline-light btn-sm" id="btnRefresh"><i class="bi bi-arrow-repeat me-1"></i>Atualizar</button>
    </div>
    <hr class="soft"/>

    <div class="table-responsive">
      <table class="table table-dark table-hover align-middle mb-0">
        <thead>
          <tr>
            <th>Tipo</th>
            <th>Cliente</th>
            <th>Status</th>
            <th>Endereço</th>
            <th style="width: 220px;">Ações</th>
          </tr>
        </thead>
        <tbody id="servicesTbody">
          <tr><td colspan="5" class="small-muted">Carregando...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<div class="spinner-overlay" id="spinnerOverlay">
  <div class="text-center">
    <div class="spinner-border text-light"></div>
    <div class="mt-2" id="spinnerLabel">Carregando...</div>
  </div>
</div>
<div class="toast-container position-fixed top-0 end-0 p-3" id="toastHost"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script type="module" src="./js/terceiroPage.js"></script>
</body>
</html>
